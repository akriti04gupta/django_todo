<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-light bg-light mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'task:task_list' %}">Todo App</a>
      <form method="GET" action="{% url 'task:task_priority' %}" style="display: flex; gap: 8px; align-items: center;">
        <select name="priority" class="form-control">
          <option value="">Select Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <button type="submit">Search</button>
      </form>
      <form method="GET" action="{% url 'task:task_status' %}" style="display: flex; gap: 8px; align-items: center;">
        <select name="status" class="form-control">
          <option value="">Select Status</option>
          <option value="completed">Completed</option>
          <option value="overdue">Overdue</option>
        </select>
        <button type="submit">Search</button>
      </form>
      <a class="btn btn-primary" href="{% url 'task:task_add' %}">Add Task</a>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
