{% extends 'task/base.html' %}
{% block content %}
<form action= "{% url 'task:task_edit' task.id %}" method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value={{task.title}}>
    </div>
   <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" rows="3" class="form-control">{{task.description}}</textarea>
    </div>
    <div class="mb-3 d-flex align-items-end gap-3">
        <div>
            <label class="form-label">Task Start Date: </label>
            <input type="date" name="start_date" class="form-control" value={{ task.start_date|date:'Y-m-d' }}>
        </div>
        <div>
            <label class="form-label">Task End Date: </label>
            <input type="date" name="end_date" class="form-control" value={{task.end_date|date:'Y-m-d'}}>
        </div>
        <div>
            <label class="form-label">Priority</label>
            <select name="priority" class="form-control">
                <option value="high"{% if task.priority == "high" %}selected{% endif %} >High</option>
                <option value="medium"{% if task.priority == 'medium'%}selected{% endif %}>Medium</option>
                <option value="low"{% if task.priority == 'low'%}selected{% endif %}>Low</option>
            </select>
        </div>
        <div>
            <label>
                <input type="checkbox" name="is_completed"{% if task.completed %}checked{% endif %}>Completed
            </label>
</div>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
{% endblock %}
